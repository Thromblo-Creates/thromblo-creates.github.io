name: Deploy to GitHub Pages

# Builds the static Astro site and publishes it to GitHub Pages on every push to
# main. No server runs in production; the whole site is prerendered HTML/CSS/JS
# served from the Pages CDN.
#
# One-time setup in the repo: Settings > Pages > "Build and deployment" >
# Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't pile up concurrent publishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # If you move the site into a project repo served at /<repo>/, set the
        # base path for the build by uncommenting the next two lines:
        # env:
        #   PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
